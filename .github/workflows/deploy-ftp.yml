# Deploy The Game Hour v2 to cPanel (public_html) via lftp + explicit FTPS (port 21).
#
# Secrets (required): FTP_SERVER, FTP_USERNAME, FTP_PASSWORD
# Variables (optional): FTP_SITE_DIR — use "." when FTP login root is already public_html
#                        DEPLOY_URL — live site URL for post-deploy checks (default: https://thegamehour.com)
#
# Uploads: dist/ → public_html/
# Never overwrites/deletes: cms/config.php, uploads/**, cms/uploads/**

name: Deploy FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-ftp
  cancel-in-progress: true

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      DEPLOY_URL: ${{ vars.DEPLOY_URL || 'https://thegamehour.com' }}
    steps:
      - name: Validate FTP secrets
        run: |
          if [ -z "$FTP_SERVER" ]; then echo "::error::Missing secret FTP_SERVER"; exit 1; fi
          if [ -z "$FTP_USERNAME" ]; then echo "::error::Missing secret FTP_USERNAME"; exit 1; fi
          if [ -z "$FTP_PASSWORD" ]; then echo "::error::Missing secret FTP_PASSWORD"; exit 1; fi
          echo "FTP secrets present."
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -d dist/assets
          test -d dist/cms
          test -f dist/cms/config.sample.php
          test ! -f dist/cms/config.php
          echo "dist/ ready ($(find dist -type f | wc -l) files)."

      - name: Resolve FTP paths
        id: paths
        run: |
          # Deploy user chrooted to public_html — use "." when login root is already the site root.
          SITE_DIR="${{ vars.FTP_SITE_DIR }}"
          SITE_DIR="${SITE_DIR:-.}"
          SITE_DIR="${SITE_DIR%/}"
          if [ -z "$SITE_DIR" ]; then SITE_DIR="."; fi
          echo "site_dir=${SITE_DIR}" >> "$GITHUB_OUTPUT"
          echo "FTP site target: ${SITE_DIR} (login root when '.')"

      - name: Install lftp
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq lftp

      - name: Deploy via lftp (explicit FTPS)
        id: deploy
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          SITE_DIR: ${{ steps.paths.outputs.site_dir }}
        run: |
          set -euo pipefail
          REPO_ROOT="$GITHUB_WORKSPACE"

          echo "Deploying: dist/ → ${SITE_DIR}/"
          echo "Mode: explicit FTPS (port 21), passive, verify-cert=no"
          echo "Protected on server: cms/config.php, uploads/**, cms/uploads/**"

          lftp -e "
          set ftp:passive-mode true;
          set ftp:ssl-force true;
          set ftp:ssl-protect-data true;
          set ssl:verify-certificate no;
          open -u ${FTP_USERNAME},${FTP_PASSWORD} ftp://${FTP_SERVER};
          cd ${SITE_DIR};
          # Vite hashes change each build; remove stale bundles so index.html cannot reference old JS
          rm -rf assets;
          lcd ${REPO_ROOT}/dist;
          mirror -R --delete --parallel=4 . . \
            --exclude-glob 'cms/config.php' \
            --exclude-glob 'uploads/**' \
            --exclude-glob 'cms/uploads/**' \
            --exclude-glob '.env' \
            --exclude-glob '.env.*' \
            --exclude-glob 'logs/**';
          bye
          "

          echo "lftp deploy completed."

      - name: Post-deploy health check
        id: health
        run: |
          set +e
          BASE="${DEPLOY_URL%/}"
          FAIL=0
          HOME_OK=0

          check_url() {
            local name="$1"
            local path="$2"
            local url="${BASE}${path}"
            local code
            code=$(curl -sS -o /tmp/deploy-body.txt -w "%{http_code}" --max-time 45 -L "$url")
            echo "--- ${name}: ${url} → HTTP ${code}"
            if [ "$code" -lt 200 ] || [ "$code" -ge 400 ]; then
              echo "::warning::${name}: HTTP ${code}"
              FAIL=1
              return 1
            fi
            return 0
          }

          check_url home "/" && HOME_OK=1

          {
            echo "home_ok=${HOME_OK}"
            echo "checks_failed=${FAIL}"
          } >> "$GITHUB_OUTPUT"

          echo ""
          echo "=== Deployment status ==="
          echo "| Check | URL | Result |"
          echo "|-------|-----|--------|"
          echo "| home | ${BASE}/ | $([ "$HOME_OK" = 1 ] && echo pass || echo fail) |"

          if [ "$FAIL" -ne 0 ]; then
            echo ""
            echo "::warning::Deploy upload completed but the homepage health check failed."
            exit 1
          fi
          echo ""
          echo "Post-deploy health check passed."

      - name: Deployment summary
        if: always()
        run: |
          {
            echo "## Deploy summary — The Game Hour"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| **Commit** | \`${{ github.sha }}\` |"
            echo "| **Branch** | \`${{ github.ref_name }}\` |"
            echo "| **Trigger** | \`${{ github.event_name }}\` |"
            echo "| **Tool** | lftp (explicit FTPS, port 21, passive) |"
            echo "| **Source** | \`dist/\` (npm ci + npm run build) |"
            echo "| **Target** | \`${{ steps.paths.outputs.site_dir }}/\` on \`${{ secrets.FTP_SERVER }}\` |"
            echo "| **Live URL** | ${{ env.DEPLOY_URL }} |"
            echo "| **Hashed assets** | \`assets/\` removed before mirror; fresh bundles uploaded |"
            echo "| **Protected paths** | \`cms/config.php\`, \`uploads/**\`, \`cms/uploads/**\` |"
            echo "| **Homepage check** | $([ '${{ steps.health.outputs.home_ok }}' = '1' ] && echo ✅ pass || echo ❌ fail / skipped) |"
            echo ""
            echo "### Flow"
            echo "\`\`\`"
            echo "GitHub push → Actions → FTPS (port 21) → public_html"
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
